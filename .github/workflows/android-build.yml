name: Build Android APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up Java JDK (v17 is required for modern Android/Capacitor builds)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # Step 3: Set up Node.js (v22 is required by Capacitor CLI)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      # Step 4: Install client dependencies & build the React project
      - name: Install and Build Client
        run: |
          cd client
          npm install
          npm run build

      # Step 5: Sync Capacitor assets to the native Android project
      - name: Sync Capacitor
        run: |
          cd client
          npx cap sync

      # Step 6: Build the Android Debug APK using Gradle wrapper
      - name: Build Android APK
        run: |
          cd client/android
          chmod +x ./gradlew
          ./gradlew assembleDebug

      # Step 7: Upload the compiled APK as a GitHub build artifact
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tet-prep-apk
          path: client/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
