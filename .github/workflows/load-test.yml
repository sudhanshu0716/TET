name: Load Test with k6

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: "Target URL to load test (e.g., Vercel deployment or staging API URL)"
        required: true
        default: "https://tet-exam-lake.vercel.app"
      vus:
        description: "Number of concurrent virtual users (VUs)"
        required: true
        default: "50"
      duration:
        description: "Test duration (e.g., 15s, 30s, 1m, 3m)"
        required: true
        default: "30s"

jobs:
  k6-test:
    name: High Concurrency Load Test
    # Execute only on manual trigger
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./TET

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'


      - name: Run k6 load test
        uses: grafana/k6-action@v0.3.1
        continue-on-error: true
        with:
          filename: tests/load/test.js
          flags: --env TARGET_URL=${{ github.event.inputs.target_url != '' && github.event.inputs.target_url || 'https://tet-exam-lake.vercel.app' }} --vus ${{ github.event.inputs.vus != '' && github.event.inputs.vus || '50' }} --duration ${{ github.event.inputs.duration != '' && github.event.inputs.duration || '30s' }}


      - name: Check generated summary
        run: |
          echo "Current directory:"
          pwd
          echo "Files in current directory:"
          ls -la
          if [ -f summary.json ]; then
            echo "✅ summary.json found"
            ls -lh summary.json
          else
            echo "❌ Error: summary.json was not created!"
            echo "Searching for summary.json in subdirectories:"
            find . -name "summary.json" 2>/dev/null || echo "No summary.json found anywhere"
            exit 1
          fi

      - name: Compile Performance Report
        if: always()
        run: node tests/load/generate_report.js

      - name: Check generated report HTML
        if: always()
        run: |
          echo "Current directory:"
          pwd
          echo "Files in current directory:"
          ls -la
          if [ -f load-test-report.html ]; then
            echo "✅ load-test-report.html found"
            ls -lh load-test-report.html
          else
            echo "❌ Error: load-test-report.html was not created!"
            echo "Searching for load-test-report.html in subdirectories:"
            find . -name "load-test-report.html" 2>/dev/null || echo "No load-test-report.html found anywhere"
          fi

      - name: Upload Performance Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-load-test-performance-report
          path: |
            summary.json
            load-test-report.html
          retention-days: 30
