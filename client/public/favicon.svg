<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#020617" flood-opacity="0.4" />
    </filter>
  </defs>
  
  <!-- App Icon Background -->
  <rect width="512" height="512" rx="115" fill="url(#grad1)" />
  
  <!-- Inner Glass Highlight -->
  <rect width="512" height="512" rx="115" fill="none" stroke="#ffffff" stroke-width="8" stroke-opacity="0.3" />
  
  <!-- Graduation Cap Group -->
  <g filter="url(#shadow)">
    <!-- Cap Top -->
    <path d="M256 120 L80 215 L256 310 L432 215 Z" fill="#ffffff" />
    
    <!-- Cap Base -->
    <path d="M140 250 L140 330 C140 365, 200 400, 256 400 C312 400, 372 365, 372 330 L372 250" fill="none" stroke="#ffffff" stroke-width="36" stroke-linecap="round" />
    
    <!-- Tassel String -->
    <path d="M432 215 L432 300" stroke="#ffffff" stroke-width="14" stroke-linecap="round" />
    
    <!-- Tassel Base -->
    <circle cx="432" cy="215" r="14" fill="#ffffff" />
    <path d="M420 295 L444 295 L450 340 L414 340 Z" fill="#ffffff" />
  </g>
</svg>