<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" id="theme-color-meta" content="#020617" />
    <meta name="description" content="The ultimate preparation companion for UPTET & CTET success. Daily practice, revision notes, classroom simulator, and more." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/icon-512.png" />
    <title>UPTET/CTET Prep</title>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  </head>
  <body>
    <script>
      // FOUC Prevention: apply saved theme before React hydration
      (function() {
        try {
          var theme = localStorage.getItem('theme');
          if (theme === 'light') {
            document.body.classList.add('light-mode');
          }
          var uiVersion = localStorage.getItem('uiVersion');
          if (uiVersion === 'v2') document.body.classList.add('theme-v2');
          else if (uiVersion === 'v3') document.body.classList.add('theme-v3');
          var meta = document.getElementById('theme-color-meta');
          if (meta) {
            meta.content = theme === 'light' ? '#f1f5f9' : '#020617';
          }
        } catch(e) {}
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
